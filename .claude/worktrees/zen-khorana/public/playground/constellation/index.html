<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constellation</title>
  <meta name="description" content="AI-powered code space that catches the obvious, the subtle, and the how did that even happen.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1b26;
      --fg: #c0caf5;
      --muted: #565f89;
      --border: #414868;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html { background: var(--bg); cursor: crosshair; }

    body {
      font-family: var(--sans);
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Frame ── */
    .frame {
      margin: 20px;
      border: 1px solid var(--border);
      min-height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 72px 24px 40px;
      flex-shrink: 0;
    }

    .hero h1 {
      font-family: 'Geist', system-ui, sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ── Landscape ── */
    .landscape-wrap {
      flex: 1;
      min-height: 180px;
      position: relative;
      overflow: hidden;
    }

    #landscape {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-crisp-edges;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    /* ── Hatched separator ── */
    .hatch {
      height: 14px;
      background: repeating-linear-gradient(
        -45deg,
        transparent, transparent 3px,
        var(--border) 3px, var(--border) 3.5px
      );
      opacity: 0.25;
    }

    .copyright {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .frame { margin: 10px; min-height: calc(100vh - 20px); }
      .hero { padding: 48px 16px 28px; }
      .copyright { padding: 12px 16px; }
    }
  </style>
</head>

<body>
  <div class="frame">

    <section class="hero">
      <h1>Constellation</h1>
    </section>

    <div class="landscape-wrap">
      <canvas id="landscape"></canvas>
    </div>

    <footer class="footer">
      <div class="hatch"></div>
      <div class="copyright">
        <span>&copy; 2026 Constellation</span>
        <span>Hunter Bastian</span>
      </div>
    </footer>

  </div>

  <script>
    /* ── Bayer 8x8 ordered dithering matrix ── */
    const BAYER = [
      [ 0,48,12,60, 3,51,15,63],
      [32,16,44,28,35,19,47,31],
      [ 8,56, 4,52,11,59, 7,55],
      [40,24,36,20,43,27,39,23],
      [ 2,50,14,62, 1,49,13,61],
      [34,18,46,30,33,17,45,29],
      [10,58, 6,54, 9,57, 5,53],
      [42,26,38,22,41,25,37,21]
    ];

    /* ── Color constants ── */
    const BG = [26, 27, 38];       // #1a1b26 Tokyo Night

    // Dot colors: Japanese whites (far/ethereal) → Tokyo Night blues (near/solid)
    const DOT_COLORS = [
      [247, 252, 254],  // #F7FCFE — unoharairo (cool ethereal white)
      [231, 231, 235],  // #E7E7EB — murasakisuishiyou (purple water)
      [229, 228, 230],  // #E5E4E6 — shiraumenezu (white plum grey)
      [125, 207, 255],  // #7dcfff — Tokyo Night light blue
      [122, 162, 247],  // #7aa2f7 — Tokyo Night blue
      [86, 95, 137],    // #565f89 — muted blue-gray
      [65, 72, 104],    // #414868 — dark navy
    ];
    const DOT_SCALE = 3;

    /* ── Utilities ── */
    function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }

    function wave(nx, freq, amp, phase) {
      return Math.sin(nx * Math.PI * freq + phase) * amp;
    }

    function gauss(x, center, width) {
      return Math.exp(-((x - center) ** 2) / (2 * width ** 2));
    }

    // Hash-based smooth noise
    function noise(nx, scale, seed) {
      const x = nx * scale + seed;
      const i = Math.floor(x);
      const f = x - i;
      const u = f * f * (3 - 2 * f);
      const a = (Math.sin(i * 127.1 + seed * 311.7) * 43758.5453) % 1;
      const b = (Math.sin((i + 1) * 127.1 + seed * 311.7) * 43758.5453) % 1;
      return Math.abs(a) * (1 - u) + Math.abs(b) * u;
    }

    // Ridged fBm noise — creates sharp, jagged peaks
    function ridgeNoise(nx, seed, octaves) {
      let value = 0, amplitude = 1, frequency = 1, weight = 1;
      for (let i = 0; i < octaves; i++) {
        let n = noise(nx, frequency * 4, seed + i * 97);
        n = 1 - Math.abs(n * 2 - 1);   // ridge inversion
        n = n * n * weight;             // sharpen tips
        weight = Math.min(n * 2.5, 1);  // weight successive octaves
        value += n * amplitude;
        amplitude *= 0.5;
        frequency *= 2.1;
      }
      return Math.pow(value * 0.55, 2.2); // power redistribution — dramatic
    }

    // Asymmetric peak — windward side gentle, leeward side steep
    function peak(nx, center, width, height, skew) {
      const sk = skew || 0;
      const d = (nx - center) / width;
      const ad = d < 0 ? Math.abs(d) * (1 - sk) : Math.abs(d) * (1 + sk);
      if (ad >= 1) return 0;
      return Math.pow(1 - ad, 1.8) * height;
    }

    // Tree line texture
    function treeLine(nx, seed) {
      return (
        Math.abs(Math.sin(nx * Math.PI * 38 + seed)) * 0.005 +
        Math.abs(Math.sin(nx * Math.PI * 55 + seed * 1.7)) * 0.003 +
        Math.abs(Math.sin(nx * Math.PI * 82 + seed * 2.3)) * 0.002
      );
    }

    /* ── Mountain layers ── */
    function mountainY(nx, layer, h) {
      switch (layer) {
        case 0: // Ethereal far peaks — one dominant, two secondary
          return h * (0.40
            - peak(nx, 0.38, 0.16, 0.30, 0.25)
            - peak(nx, 0.28, 0.08, 0.14, -0.2)  // shoulder
            - peak(nx, 0.70, 0.12, 0.18, -0.15)
            - peak(nx, 0.85, 0.07, 0.08, 0.1)   // foothill
            - ridgeNoise(nx, 1.0, 4) * 0.05);

        case 1: // Distant range — staggered peaks with ridgeline
          return h * (0.44
            - peak(nx, 0.15, 0.10, 0.20, 0.4)
            - peak(nx, 0.42, 0.08, 0.30, -0.35)  // tallest distant peak
            - peak(nx, 0.52, 0.05, 0.16, 0.2)    // shoulder ridge
            - peak(nx, 0.78, 0.11, 0.18, 0.15)
            - peak(nx, 0.93, 0.06, 0.08, -0.1)
            - ridgeNoise(nx, 2.5, 4) * 0.04);

        case 2: // Mid-distance — jagged ridgeline, geological feel
          return h * (0.50
            - peak(nx, 0.08, 0.09, 0.16, 0.35)
            - peak(nx, 0.28, 0.07, 0.24, -0.45)
            - peak(nx, 0.36, 0.04, 0.12, 0.2)   // sub-peak
            - peak(nx, 0.55, 0.08, 0.18, 0.15)
            - peak(nx, 0.72, 0.06, 0.20, -0.3)
            - peak(nx, 0.88, 0.09, 0.12, -0.15)
            - ridgeNoise(nx, 4.0, 4) * 0.045);

        case 3: // Valley frame — dramatic gap in center
          return h * (0.56
            - peak(nx, 0.05, 0.10, 0.22, 0.5)
            - peak(nx, 0.25, 0.06, 0.14, -0.3)
            - peak(nx, 0.76, 0.09, 0.22, -0.45)
            - peak(nx, 0.90, 0.06, 0.10, 0.2)
            + gauss(nx, 0.50, 0.15) * 0.14       // wide valley opening
            - ridgeNoise(nx, 5.5, 3) * 0.025);

        case 4: // Left mass — sweeping, towering
          return h * (0.64
            - Math.pow(clamp01(1.0 - nx * 1.4), 0.32) * 0.36
            - peak(nx, 0.08, 0.06, 0.12, 0.5)
            - peak(nx, 0.22, 0.05, 0.06, -0.3)  // spur
            - ridgeNoise(nx, 7.0, 3) * 0.018);

        case 5: // Right mass — slightly set back
          return h * (0.66
            - Math.pow(clamp01((nx - 0.38) * 1.35), 0.38) * 0.30
            - peak(nx, 0.82, 0.07, 0.14, -0.4)
            - peak(nx, 0.92, 0.04, 0.06, 0.2)   // spur
            - ridgeNoise(nx, 8.5, 3) * 0.018);

        case 6: // Forested foothills — organic silhouette
          return h * (0.76
            - wave(nx, 0.8, 0.04, 0.7)
            - wave(nx, 2.0, 0.022, 1.4)
            - treeLine(nx, 1.0)
            - ridgeNoise(nx, 10.0, 3) * 0.015);

        case 7: // Rolling meadow foreground
          return h * (0.86
            - wave(nx, 0.5, 0.035, 1.1)
            - wave(nx, 1.5, 0.015, 0.4)
            - treeLine(nx, 3.5)
            - ridgeNoise(nx, 12.0, 2) * 0.008);

        case 8: // Closest ground — gentle sweep
          return h * (0.93
            - wave(nx, 0.4, 0.025, 0.2)
            - wave(nx, 1.1, 0.01, 1.8));
      }
    }

    //              0    1    2    3    4    5    6    7    8
    const SHADES = [180, 162, 142, 118, 92, 98, 65, 38, 14];

    /* ── Draw grayscale scene ── */
    function drawScene(ctx, w, h) {
      // Sky — subtle gradient, mostly dark after dithering
      const sky = ctx.createLinearGradient(0, 0, 0, h * 0.55);
      sky.addColorStop(0, '#fdfdfd');
      sky.addColorStop(0.5, '#f0eeec');
      sky.addColorStop(1, '#e0deda');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      // Mountain layers (back to front)
      for (let L = 0; L < 9; L++) {
        const s = SHADES[L];
        ctx.fillStyle = `rgb(${s},${s},${s})`;
        ctx.beginPath();
        ctx.moveTo(0, h);
        for (let x = 0; x <= w; x++) {
          ctx.lineTo(x, mountainY(x / w, L, h));
        }
        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();
      }

      // Valley mist — soft radial glow
      const mist = ctx.createRadialGradient(
        w * 0.48, h * 0.52, 0,
        w * 0.48, h * 0.54, w * 0.24
      );
      mist.addColorStop(0, 'rgba(240, 238, 236, 0.45)');
      mist.addColorStop(0.4, 'rgba(240, 238, 236, 0.2)');
      mist.addColorStop(1, 'rgba(240, 238, 236, 0)');
      ctx.fillStyle = mist;
      ctx.fillRect(0, 0, w, h);

      // Horizon haze
      const haze = ctx.createLinearGradient(0, h * 0.35, 0, h * 0.55);
      haze.addColorStop(0, 'rgba(235, 232, 228, 0)');
      haze.addColorStop(0.5, 'rgba(235, 232, 228, 0.15)');
      haze.addColorStop(1, 'rgba(235, 232, 228, 0)');
      ctx.fillStyle = haze;
      ctx.fillRect(0, 0, w, h);

      // Moonlight on peaks — subtle bright wash on high ridgelines
      const moonlight = ctx.createLinearGradient(0, 0, w, h * 0.3);
      moonlight.addColorStop(0, 'rgba(248, 251, 248, 0.08)');
      moonlight.addColorStop(0.5, 'rgba(247, 252, 254, 0.05)');
      moonlight.addColorStop(1, 'rgba(248, 251, 248, 0)');
      ctx.fillStyle = moonlight;
      ctx.fillRect(0, 0, w, h * 0.5);
    }

    // Map luminance to dot color — Japanese whites (far) → Tokyo Night blues (near)
    function dotColor(lum) {
      const t = clamp01(1 - lum / 255);
      const idx = t * (DOT_COLORS.length - 1);
      const lo = Math.floor(idx);
      const hi = Math.min(lo + 1, DOT_COLORS.length - 1);
      const f = idx - lo;
      return [
        DOT_COLORS[lo][0] + (DOT_COLORS[hi][0] - DOT_COLORS[lo][0]) * f,
        DOT_COLORS[lo][1] + (DOT_COLORS[hi][1] - DOT_COLORS[lo][1]) * f,
        DOT_COLORS[lo][2] + (DOT_COLORS[hi][2] - DOT_COLORS[lo][2]) * f,
      ];
    }

    /* ── Ordered dithering ── */
    function dither(ctx, w, h) {
      const img = ctx.getImageData(0, 0, w, h);
      const d = img.data;

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          const lum = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
          const threshold = (BAYER[y & 7][x & 7] / 64) * 255;
          const dark = lum <= threshold;
          const c = dark ? dotColor(lum) : BG;
          d[i]     = c[0];
          d[i + 1] = c[1];
          d[i + 2] = c[2];
          d[i + 3] = 255;
        }
      }

      ctx.putImageData(img, 0, 0);
    }

    /* ── Init ── */
    (function init() {
      const wrap = document.querySelector('.landscape-wrap');
      const canvas = document.getElementById('landscape');
      const ctx = canvas.getContext('2d');

      function render() {
        const dw = wrap.clientWidth;
        const dh = wrap.clientHeight;
        if (dw < 1 || dh < 1) return;

        const w = Math.floor(dw / DOT_SCALE);
        const h = Math.floor(dh / DOT_SCALE);

        canvas.width = w;
        canvas.height = h;

        drawScene(ctx, w, h);
        dither(ctx, w, h);
      }

      // Observe container size changes
      if (window.ResizeObserver) {
        new ResizeObserver(render).observe(wrap);
      } else {
        render();
        window.addEventListener('resize', render);
      }
    })();
  </script>
</body>
</html>
